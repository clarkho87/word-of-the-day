      { word:"Determined",    phonetic:"deh-TER-mind",       type:"Adjective", definition:"Trying really hard and refusing to give up.", sentences:["She was determined to tie her shoes.","He was determined to finish the puzzle.","Being determined means you keep going!"], example:"Like practicing your ABCs until you know every single letter!" },
      { word:"Energetic",     phonetic:"en-er-JET-ik",       type:"Adjective", definition:"Having lots and lots of energy!", sentences:["She was energetic and played all afternoon.","Energetic kids are always ready for fun.","He was so energetic he woke before everyone else!"], example:"Like bouncing on the bed at 6 AM because you are just SO awake!" },
      { word:"Enormous",      phonetic:"eh-NOR-mus",         type:"Adjective", definition:"Super, super, super big!", sentences:["The elephant was enormous!","We saw an enormous birthday cake.","The enormous tree touched the clouds."], example:"Like a dinosaur — way bigger than a house!" },
      { word:"Flexible",      phonetic:"FLEK-sih-bul",       type:"Adjective", definition:"Able to bend easily, or willing to change plans.", sentences:["She was flexible when plans changed.","Being flexible means adapting to new situations.","Yoga helps your body become flexible!"], example:"Like being perfectly okay going to the park instead of the beach." },
      { word:"Generous",      phonetic:"JEN-er-us",          type:"Adjective", definition:"Giving freely and happily without being asked.", sentences:["She was generous and shared all her stickers.","Being generous means giving more than you have to.","He was generous with his time and always helped."], example:"Like giving someone your last piece of gum even though you really wanted it!" },
      { word:"Gentle",        phonetic:"JEN-tul",            type:"Adjective", definition:"Being soft and careful with people or animals.", sentences:["Please be gentle with the baby kitten.","She gave a gentle hug.","He was gentle when he touched the butterfly."], example:"Like how you pet a tiny bunny very slowly and softly." },
      { word:"Grateful",      phonetic:"GRAYT-ful",          type:"Adjective", definition:"Feeling happy and thankful for something good in your life.", sentences:["She was grateful for her birthday gifts.","We are grateful for our cozy home.","I am so grateful to have you as my friend!"], example:"Like that warm feeling when someone does something really nice for you." },
      { word:"Helpful",       phonetic:"HELP-ful",           type:"Adjective", definition:"Doing things that make life easier for others.", sentences:["She was helpful by setting the table.","Being helpful makes others feel good.","You are so helpful when you pick up your toys!"], example:"Like carrying groceries in for a grown-up without being asked!" },
      { word:"Honest",        phonetic:"ON-est",             type:"Adjective", definition:"Always telling the truth, even when it is hard.", sentences:["She was honest about breaking the vase.","Being honest builds trust.","An honest friend is a true friend!"], example:"Like telling the truth even when you're worried about the response." },
      { word:"Humble",        phonetic:"HUM-bul",            type:"Adjective", definition:"Not boastful — being happy with yourself quietly.", sentences:["She was humble even after winning the award.","Humble people cheer for others too.","He was humble and thanked his teammates first."], example:"Like winning a race but still clapping for everyone who finished!" },
      { word:"Joyful",        phonetic:"JOY-ful",            type:"Adjective", definition:"Feeling really, really happy inside.", sentences:["She felt joyful on her birthday.","The puppy made everyone feel joyful.","Singing makes me feel joyful!"], example:"Like that giant smile you just can't stop on Christmas morning!" },
      { word:"Kind",          phonetic:"KYND",               type:"Adjective", definition:"Nice and caring toward other people.", sentences:["It was kind of her to share her cookies.","He was kind to help his friend up.","Being kind makes the world a better place!"], example:"Like giving your friend a hug when they feel sad." },
      { word:"Loyal",         phonetic:"LOY-ul",             type:"Adjective", definition:"Always sticking by your friends and family no matter what.", sentences:["A loyal friend stays with you when you're sad.","Dogs are known for being very loyal.","She was loyal to her best friend through everything."], example:"Like always saving a seat for your best friend at lunch." },
      { word:"Mindful",       phonetic:"MYND-ful",           type:"Adjective", definition:"Paying careful attention to what is happening right now.", sentences:["Be mindful of others' feelings.","She practiced mindful breathing to stay calm.","Mindful kids are kind and focused."], example:"Like eating slowly and actually tasting every single flavor in your food!" },
      { word:"Patient",       phonetic:"PAY-shent",          type:"Adjective", definition:"Waiting calmly without getting upset.", sentences:["She was patient while waiting for her turn.","Being patient is hard but always worth it.","He waited patiently for the cookies to cool."], example:"Like waiting for your birthday cake to come out of the oven without peeking!" },
      { word:"Polite",        phonetic:"poh-LYT",            type:"Adjective", definition:"Using good manners and being respectful to others.", sentences:["It is polite to say please and thank you.","She was polite to her teacher.","Polite people make others feel respected."], example:"Like saying 'excuse me' when you need to walk in front of someone." },
      { word:"Proud",         phonetic:"PROWD",              type:"Adjective", definition:"Feeling really good about something you or someone else did.", sentences:["She was proud of her painting.","I am so proud of how hard you worked!","He felt proud when he helped his friend succeed."], example:"Like that giant smile after you finally ride your bike without training wheels!" },
      { word:"Resilient",     phonetic:"reh-ZIL-yent",       type:"Adjective", definition:"Bouncing back after something hard happens.", sentences:["She was resilient after losing the game.","Resilient kids try again after making mistakes.","Like a rubber ball — resilient things always bounce back!"], example:"Like falling down, getting back up, and smiling!" },
      { word:"Responsible",   phonetic:"reh-SPON-sih-bul",   type:"Adjective", definition:"Doing the things you are supposed to do.", sentences:["She was responsible and fed her fish every day.","It is responsible to put your toys away.","Responsible people can be counted on."], example:"Like remembering to brush your teeth every night without being told." },
      { word:"Selfless",      phonetic:"SELF-les",           type:"Adjective", definition:"Thinking about others before thinking about yourself.", sentences:["She was selfless and gave away her last cookie.","A selfless act is done just to help — not for reward.","Being selfless makes you a hero to others!"], example:"Like letting your little sibling pick the movie even when you want to!" },
      { word:"Sincere",       phonetic:"sin-SEER",           type:"Adjective", definition:"Really meaning what you say — being genuine and true.", sentences:["Her apology was sincere and kind.","He gave a sincere thank you.","A sincere compliment makes people feel truly special!"], example:"Like saying 'I love you' and truly, deeply meaning every word." },
      { word:"Thankful",      phonetic:"THANK-ful",          type:"Adjective", definition:"Feeling glad and appreciative for what you have.", sentences:["She was thankful for her warm bed.","We are thankful for our yummy food.","Being thankful makes your heart feel full!"], example:"Like saying thank you and actually meaning it with your whole heart!" },
      { word:"Thoughtful",    phonetic:"THOT-ful",           type:"Adjective", definition:"Carefully considering others' feelings before you act.", sentences:["She was thoughtful and made her friend a card.","A thoughtful gift shows you truly care.","He was thoughtful and saved a seat for his friend."], example:"Like remembering your friend is allergic to peanuts before making them a snack!" },
      { word:"Trustworthy",   phonetic:"TRUST-wur-thee",     type:"Adjective", definition:"Someone you can always count on to do what they say.", sentences:["She was trustworthy and always kept her promise.","Trustworthy friends keep your secrets safe.","Being trustworthy means people believe you."], example:"Like the friend who ALWAYS shows up when they say they will — every time!" },
      { word:"Unique",        phonetic:"yoo-NEEK",           type:"Adjective", definition:"One of a kind — there is nobody else exactly like you!", sentences:["Your fingerprints are totally unique.","Every snowflake is unique.","You are unique and very special!"], example:"Like how no two butterflies have the exact same wing pattern!" },
      { word:"Valuable",      phonetic:"VAL-yoo-bul",        type:"Adjective", definition:"Something that is very important or meaningful.", sentences:["Kindness is very valuable.","Her time is valuable.","This book is valuable because it teaches great lessons."], example:"Like how a hug from your mom is worth more than all the gold in the world!" },
      { word:"Wonderful",     phonetic:"WUN-der-ful",        type:"Adjective", definition:"Really great and amazing in every way!", sentences:["You did a wonderful job today!","It was a wonderful day at the park.","What a wonderful surprise!"], example:"Like waking up to find it already snowed overnight!" },
    ];

    // ── Token guard — only send if URL has correct token ──
    const params = new URLSearchParams(window.location.search);
    if (params.get("token") !== SECRET_TOKEN) {
      document.body.innerHTML = `<p style="font-family:sans-serif;padding:20px;color:#999">Nothing to see here! 🌻</p>`;
      throw new Error("Unauthorized");
    }

    // ── Get today's word ──────────────────────────────────
    function getDayOfYear() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      return Math.floor((now - start) / 86400000);
    }

    const wordList = Array.from({ length: 365 }, (_, i) => words[i % words.length]);
    const dayNum = getDayOfYear();
    const w = wordList[dayNum - 1];

    const typeBadge = { Noun: "🧩 NOUN", Verb: "⚡ VERB", Adjective: "🎨 ADJECTIVE" }[w.type] || w.type;

    // ── Send email via EmailJS REST API (works without a browser) ──
    fetch("https://api.emailjs.com/api/v1.0/email/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        service_id:  EMAILJS_SERVICE_ID,
        template_id: EMAILJS_TEMPLATE_ID,
        user_id:     EMAILJS_PUBLIC_KEY,
        template_params: {
          to_email:   RECIPIENT_EMAIL,
          day_num:    dayNum,
          word:       w.word,
          type_badge: typeBadge,
          phonetic:   w.phonetic,
          definition: w.definition,
          sentences:  w.sentences.map((s, i) => `${i + 1}. ${s}`).join("\n"),
          example:    w.example,
        }
      })
    })
    .then(res => {
      if (res.ok) {
        document.body.innerHTML = `<h2 style="font-family:sans-serif;color:green;padding:20px">
          ✅ Word of the Day sent! Day ${dayNum}: <strong>${w.word}</strong>
        </h2>`;
      } else {
        return res.text().then(t => { throw new Error(t); });
      }
    })
    .catch(err => {
      document.body.innerHTML = `<h2 style="font-family:sans-serif;color:red;padding:20px">
        ❌ Failed to send email: ${err.message}
      </h2>`;
    });
  </script>
</body>
</html>
